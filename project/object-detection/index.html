<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Detection | AuthntcG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="preload" class="preload-page">
    <progress id="loading-bar" value="0" max="100"></progress>
  </div>

  <section class="parent container d-flex justify-content-center align-items-center h-100 w-100 py-4">
    <div class="card w-100" style="max-width: 900px;">
      <div class="card-body">
        <div class="row">
          <div class="col-12 mb-4">
            <a href="../../about.html" class="btn btn-mica-blue btn-sm">
              < Back To About</a>
          </div>

          <div class="col-12">
            <ul class="nav nav-tabs" id="detectionTabs" role="tablist">
              <li class="nav-item">
                <button class="nav-link active" data-mode="live" data-bs-toggle="tab" data-bs-target="#live"
                  type="button">
                  Live Camera
                </button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-mode="video" data-bs-toggle="tab" data-bs-target="#video" type="button">
                  Video File
                </button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-mode="image" data-bs-toggle="tab" data-bs-target="#image" type="button">
                  Image File
                </button>
              </li>
            </ul>

            <div class="tab-content pt-3">

              <div class="tab-pane fade show active" id="live">
                <p class="text-center mb-3 text-muted">Real-time detection using webcam.</p>

                <div id="video-container" class="media-container">
                  <video id="webcam" autoplay playsinline muted></video>
                  <canvas id="canvas-live"></canvas>

                  <button id="btn-switch-cam" class="btn btn-light btn-circle shadow" title="Switch Camera">
                    <i class="bi bi-camera-fill"></i> <i class="bi bi-arrow-repeat"></i>
                  </button>
                </div>

                <div class="mt-3">
                  <textarea id="log-live" class="form-control log-area" rows="4" readonly
                    placeholder="Detection logs..."></textarea>
                </div>
              </div>

              <div class="tab-pane fade" id="video">
                <div class="mb-3">
                  <input type="file" id="input-video" accept="video/*" class="form-control" />
                </div>

                <div id="video-container-file" class="media-container" style="display:none;">
                  <video id="video-file" controls playsinline loop muted autoplay></video>
                  <canvas id="canvas-video"></canvas>
                </div>

                <div class="mt-3">
                  <textarea id="log-video" class="form-control log-area" rows="4" readonly
                    placeholder="Detection logs..."></textarea>
                </div>
              </div>

              <div class="tab-pane fade" id="image">
                <div class="mb-3">
                  <input type="file" id="input-image" accept="image/*" class="form-control" />
                </div>

                <div id="image-container-file" class="media-container" style="display:none;">
                  <img id="image-file" alt="Preview" />
                  <canvas id="canvas-image"></canvas>
                </div>

                <div class="mt-3">
                  <textarea id="log-image" class="form-control log-area" rows="4" readonly
                    placeholder="Detection logs..."></textarea>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer px-2 text-center mt-4">
    <p>&copy;
      <script>document.write(new Date().getFullYear())</script> authntc<span style="color: blue;">G!</span>
    </p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <script src="script.js"></script>
</body>

</html>
