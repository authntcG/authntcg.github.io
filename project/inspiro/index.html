<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
    <link rel="stylesheet" href="../../assets/script/css/style.css">
</head>

<body>
    <!-- Preload Page -->
    <app-preloader class="preload-page">
        <progress id="loading-bar" value="0" max="100"></progress>
    </app-preloader>
    <!-- Floating Buttons -->
    <button class="btn btn-settings" data-bs-toggle="modal" data-bs-target="#settingsModal"><i
            class="bi bi-gear"></i></button>
    <!-- Clock & Search Area -->
    <div class="parent container d-flex justify-content-center align-items-center h-100 w-100">
        <div class="row">
            <div class="col-12 mb-0">
                <h1 class="text-start clock">Wait...</h1>
                <h6 class="pt-0 h-6" id="location-info">
                    Loading...
                </h6>
            </div>
            <form action="https://www.google.com/search" method="get">
                <div class="col-12 mb-2">
                    <div class="card">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-10 px-2">
                                    <div class="form-floating">
                                        <input type="text" class="form-control input-mica" name="q"
                                            placeholder="Search Here..." id="searchInput" required>
                                        <label for="searchInput">Search for...</label>
                                    </div>
                                </div>
                                <div class="col-2 ps-0 pe-2">
                                    <app-button type="submit" extra-class="w-100 h-100"><i
                                            class="bi-search"></i></app-button>
                                </div>
                                <div class="col-12 mt-3 mb-2" style="max-height: 10vh;" id="suggestion-panel">
                                    <div class="row d-flex align-items-center justify-content-center text-center">
                                        <div class="col-3">
                                            <a href="https://google.com" class="card">
                                                <div class="card-body">
                                                    <i class="bi bi-google" style="font-size: 2vh;"></i>
                                                </div>
                                            </a>
                                        </div>
                                        <div class="col-3">
                                            <a href="https://google.com" class="card">
                                                <div class="card-body">
                                                    <i class="bi bi-bing" style="font-size: 2vh;"></i>
                                                </div>
                                            </a>
                                        </div>
                                        <div class="col-3">
                                            <a href="https://facebook.com" class="card">
                                                <div class="card-body">
                                                    <i class="bi bi-facebook" style="font-size: 2vh;"></i>
                                                </div>
                                            </a>
                                        </div>
                                        <div class="col-3">
                                            <a href="https://instagram.com" class="card">
                                                <div class="card-body">
                                                    <i class="bi bi-instagram" style="font-size: 2vh;"></i>
                                                </div>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
            <app-weather-widget class="col-12 mb-2" id="weather-panel"></app-weather-widget>
        </div>
    </div>
    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabels" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="settingsModalLabels"><i class="bi bi-gear"></i> Settings</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-sm-12 col-lg-6 mb-2">
                            <div class="row">
                                <div class="col-8">
                                    <p>Hide Weather Panel</p>
                                </div>
                                <div class="col-4">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" role="switch"
                                            id="switchWeatherPanel" aria-checked="false">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 col-lg-6 mb-2">
                            <div class="row">
                                <div class="col-8">
                                    <p>Hide Suggestion Link Buttons</p>
                                </div>
                                <div class="col-4">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" role="switch"
                                            id="switchSuggestionPanel" aria-checked="false">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 col-lg-6 mb-2">
                            <div class="row">
                                <div class="col-8">
                                    <p>Options 3</p>
                                </div>
                                <div class="col-4">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" role="switch" id="switch3"
                                            aria-checked="false">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Information Modal -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabels" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="infoModalLabels"><i class="bi bi-info-circle-fill"></i> Weather &
                        Location Details</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-12 mb-2">
                            <h5 class="h5"><i class="bi bi-pin-map"></i> Address Information</h5>
                        </div>
                        <div class="col-12 mb-2">
                            <div class="card">
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-12 col-lg-4">
                                            <h6><i class="bi bi-crosshair"></i> Current Location</h6>
                                        </div>
                                        <div class="col-12 col-lg-8">
                                            <p id="infoLocation" class="mb-0"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-6 mb-2">
                            <div class="card">
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-12 col-lg-4">
                                            <h6><i class="bi bi-arrows"></i> Latitude</h6>
                                        </div>
                                        <div class="col-12 col-lg-8">
                                            <p id="infoLatitude" class="mb-0"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-6 mb-2">
                            <div class="card">
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-12 col-lg-4">
                                            <h6 class="bi bi-arrows-vertical"> Longitude</h6>
                                        </div>
                                        <div class="col-12 col-lg-8">
                                            <p id="infoLongitude" class="mb-0"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 mb-2">
                            <div class="card">
                                <div class="card-body">
                                    <div id="infoMaps">
                                        <!-- Maps Area -->
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Line Divider and New Titles -->
                        <div class="col-12 mb-2">
                            <hr>
                            <h5 class="h5"><i class="bi bi-thermometer-sun"></i> Weather Forecast</h5>
                        </div>
                        <app-weather-details class="col-12"></app-weather-details>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <app-footer></app-footer>
</body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
    </script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
<script src="../../assets/script/js/component.js"></script>
<script type="module" src="../../assets/script/js/weather-component.js"></script>
<script type="module" src="../../assets/script/js/script.js"></script>

</html>
